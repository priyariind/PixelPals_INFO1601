<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Home</title>
</head>
<body>


<nav class="navbar">
    <h1>Bookly</h1>
    <div class="nav-centre">
        <a href="index.html">Browse</a>
        <a href="genres.html">Genres</a>
        <a href="bookmarks.html" >Bookmarks</a>
    </div>
    <div class="nav-right" id="nav-right">
        <button id="loginBtn" onclick="openLogin()">Login</button>
    </div>
</nav>



<section class = "main">
<section class="hero">
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search books by titles, authors, or genres...">
        <button onclick="searchBooks()" id="SearchBtn">Search</button>
    </div>
</section>
<section class="carousel-section">
    <button class="carousel-btn left" onclick="scrollCarousel(-1)">◀</button>
    
    <div id="carouselContainer" class="carousel"></div>
    
    <button class="carousel-btn right" onclick="scrollCarousel(1)">▶</button>
</section>
</section>

<section class="footnote">

</section>

    <div class="modal" id="login-modal">
        <div class="modal-content">
            <div class="modal-top-right">
                <button onclick="closeLogin()" id="cancelBtn" >X</button>
            </div>


            <div class="modal-centre">
            <h3>Login</h3>

            <input type="text" id="username" placeholder="Enter Username">
            <br>
            <input type="email" id="email" placeholder="Enter Email">
            <br>
            <input type="password" id="password" placeholder="Enter Password">
            <br>
            <br>
            <button onclick="login()" id="loginBtn">Login</button>
            </div>

        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
